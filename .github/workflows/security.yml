name: Security

# Scans code on every push to main/dev and on every PR targeting them, plus a
# weekly baseline. Delegates to the shared reusable workflows in cfdude/.github so
# scanning stays consistent across repos and is maintained in one place.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — catch newly-disclosed CVEs

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    uses: cfdude/.github/.github/workflows/security-semgrep.yml@main
    permissions:
      contents: read
      security-events: write

  trivy:
    name: Trivy FS scan
    uses: cfdude/.github/.github/workflows/security-trivy.yml@main
    permissions:
      contents: read
      security-events: write
